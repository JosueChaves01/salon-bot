<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador WhatsApp - Salon Bella</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="avatar">💅</div>
      <div class="header-info">
        <h2>Asistente Salon Bella</h2>
        <p>en línea</p>
      </div>
      <a href="/dashboard.html" class="nav-link">Ir al Dashboard</a>
    </header>
    
    <div class="chat-messages" id="chat-messages">
      <div class="message system">
        Simulador conectado. Escribe un mensaje para comenzar.
      </div>
    </div>
    
    <div class="chat-input-container">
      <input type="text" id="phone-input" value="50688888888" placeholder="Tu número">
      <input type="text" id="message-input" placeholder="Escribe un mensaje aquí..." autocomplete="off">
      <button id="send-btn">Enviar</button>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
